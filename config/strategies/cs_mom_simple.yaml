# Pure cross-sectional momentum (no OI, no macro regime). Multi-year walk-forward.
name: cs_mom_simple
panel: daily

hypothesis:
  name: cs_mom_simple
  story: >
    Within the liquid crypto universe, names with stronger 20d/60d relative
    momentum earn positive excess returns vs equal-weight over multi-week holds.
  horizon_days: 5
  failure_modes:
    - momentum crashes after crowded longs
    - ADV collapse / capacity exhaustion
    - short history / survivorship bias

label:
  horizons: [5, 20]
  primary_horizon: 5

cost:
  fee_bps_rt: 10.0
  slippage_coef: 0.10

walk_forward:
  train_days: 504
  test_days: 126
  step_days: 126
  embargo_days: 20

portfolio:
  n_quantiles: 5
  vol_target_ann: 0.10
  min_adv_usd: 5000000
  rebalance: weekly
  adv_window: 20

regime:
  disabled: true
  lag_days: 1
  risk_off_z: -1.0e9
  z_window: 60

universe:
  top_n: 30

features:
  mom_windows: [20, 60]
  vol_window: 20
  volume_z_window: 20
  oi_change_window: 20
  macro_lag_days: 1

gates:
  min_net_sharpe: 0.0
  min_ir: 0.0

target_notional_usd: 1000000
max_participation: 0.01
