# BTC macro liquidity — long or flat only (no shorts).
name: btc_macro_long_only
panel: btc_macro

hypothesis:
  name: btc_macro_long_only
  story: >
    Go long BTC when lagged global-liquidity composite is risk-on; otherwise
    flat. Drops the short leg that destroyed btc_macro_ls on the multi-year sample.
  horizon_days: 20
  failure_modes:
    - macro publication lag / revision risk
    - missing risk-off shorts in bear markets
    - BTC idiosyncratic shocks unrelated to FRED liquidity

label:
  horizons: [5, 20]
  primary_horizon: 20

cost:
  fee_bps_rt: 10.0
  slippage_coef: 0.05

walk_forward:
  train_days: 504
  test_days: 126
  step_days: 126
  embargo_days: 20

portfolio:
  mode: directional
  n_quantiles: 5
  vol_target_ann: 0.10
  min_adv_usd: 0
  rebalance: weekly
  adv_window: 20
  allow_short: false

regime:
  disabled: false
  lag_days: 5
  long_z: 0.25
  short_z: -0.25
  risk_off_z: -0.25
  z_window: 60

universe:
  top_n: 1
  symbols: [BTC]

features:
  mom_windows: []
  vol_window: 20
  volume_z_window: 20
  oi_change_window: 20
  macro_lag_days: 5
  residualize_vs_btc: false

gates:
  min_net_sharpe: 0.0
  min_ir: 0.0

target_notional_usd: 1000000
max_participation: 0.01
