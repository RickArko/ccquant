database: data/ccquant.duckdb
universe:
  size: 100
  include_symbols:
    - BTC
    - ETH
    - SOL
    - HYPE
    - PAXG
  source_preference: binance
  request_delay_seconds: 0.25
daily:
  tail_days: 7
hourly:
  enabled: true
  top: 10
  history_days: 365
  tail_hours: 168
open_interest:
  enabled: true
  history_days: 365
  tail_hours: 168
  request_delay_seconds: 0.25
  binance: true
  bybit: true
  okx: true
macro:
  enabled: true
  series_ids:
    - M2SL
    - WALCL
    - DGS10
    - DGS2
    - T10YIE
    - FEDFUNDS
    - DTWEXBGS
    - VIXCLS
  request_delay_seconds: 1.0
wallet_tracking:
  enabled: true
  chains:
    - solana
    - arbitrum
    - bitcoin
  seed_file: config/seeds/wallet_registry_seed.csv
  identities_seed_file: config/seeds/wallet_identities_seed.csv
  identity_links_seed_file: config/seeds/wallet_identity_links_seed.csv
  history:
    solana_source: solarchive
    bitcoin_source: bigquery
    extract_days: 30
  tail:
    enabled: true
    interval_minutes: 15
    max_wallets: 50
    request_delay_seconds: 1.5
    solana_rpc_url: https://api.mainnet-beta.solana.com
    bitcoin_api_url: https://mempool.space/api
  discovery:
    flipside_enabled: true
    min_win_rate: 0.35
    request_delay_seconds: 1.0
twitter_tracking:
  enabled: true
  accounts_seed: config/seeds/twitter_accounts_seed.csv
  import:
    inbox_dir: data/twitter/inbox
    archive_dir: data/twitter/archive
    formats: [csv, jsonl]
    on_conflict: skip
  enrichment:
    extract_cashtags: true
    extract_addresses: true
    extract_sol_domains: true
    keyword_sentiment: true
  signals:
    spike_window_days: 30
    spike_z_threshold: 2.0

