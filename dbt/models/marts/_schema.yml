version: 2

models:
  - name: dim_assets
    description: >
      Latest snapshot of active assets in the research universe.
      One row per active symbol.
    columns:
      - name: symbol
        tests:
          - not_null
          - unique
      - name: rank
        tests:
          - not_null

  - name: fct_ohlcv_daily
    description: >
      Daily OHLCV with source deduplication by priority (binance > coinbase >
      coingecko). One row per symbol x date.
    columns:
      - name: symbol
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: close
        tests:
          - not_null
      - name: source
        tests:
          - not_null
          - accepted_values:
              values: ['binance', 'coinbase', 'coingecko']
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - symbol
            - date

  - name: fct_ohlcv_hourly
    description: >
      Hourly OHLCV with source deduplication by priority (binance > coinbase).
      One row per symbol x hour.
    columns:
      - name: symbol
        tests:
          - not_null
      - name: hour
        tests:
          - not_null
      - name: close
        tests:
          - not_null
      - name: source
        tests:
          - not_null
          - accepted_values:
              values: ['binance', 'coinbase']
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - symbol
            - hour

  - name: fct_open_interest
    description: >
      Per-exchange open interest normalized to USD notional. For exchanges
      reporting in coin or contract units, the value is converted using the
      daily close price from stg_ohlcv_daily.
    columns:
      - name: symbol
        tests:
          - not_null
      - name: timestamp
        tests:
          - not_null
      - name: exchange
        tests:
          - not_null
      - name: open_interest_usd
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - symbol
            - timestamp
            - exchange
            - interval

  - name: fct_open_interest_agg
    description: >
      Market-wide aggregate open interest. Sums USD-normalized OI across
      all exchanges present in fct_open_interest for each symbol x timestamp.
      Auto-includes new exchanges as they are enabled — no SQL changes needed.
    columns:
      - name: symbol
        tests:
          - not_null
      - name: timestamp
        tests:
          - not_null
      - name: total_open_interest_usd
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - symbol
            - timestamp
            - interval

  - name: fct_tweet_mentions_daily
    description: Daily tweet mention counts per symbol from staging layer.
    columns:
      - name: date
        tests:
          - not_null
      - name: symbol
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - date
            - symbol

  - name: fct_tweet_wallet_mentions
    description: Tweet mentions of tracked wallet addresses.
    columns:
      - name: tweet_id
        tests:
          - not_null
      - name: address
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - tweet_id
            - address

  - name: fct_tweet_account_activity
    description: Daily tweet activity aggregates per account handle.
    columns:
      - name: handle
        tests:
          - not_null
      - name: date
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - handle
            - date

  - name: fct_tweet_spike_events
    description: Symbols with tweet mention z-score >= 2.0.
    columns:
      - name: date
        tests:
          - not_null
      - name: symbol
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - date
            - symbol

  - name: mart_signals_daily
    description: >
      Canonical daily analytics panel joining price, open interest, on-chain
      signals, macro indicators, and event flags. One row per symbol x date.
      Only includes symbols in the active universe (dim_assets).
    columns:
      - name: symbol
        tests:
          - not_null
          - relationships:
              to: ref('dim_assets')
              field: symbol
      - name: date
        tests:
          - not_null
      - name: close
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - symbol
            - date

  - name: mart_ops_freshness
    description: >
      Unified sync-cursor mart for ops / data-quality monitoring across
      ohlcv, macro, onchain, wallet, and twitter domains. Not part of
      mart_signals_daily.
    columns:
      - name: domain
        tests:
          - not_null
      - name: entity_key
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - domain
            - entity_key

  - name: fct_wallet_alerts
    description: Thin mart of wallet alert events for ops monitoring.
    columns:
      - name: address
        tests:
          - not_null
      - name: chain
        tests:
          - not_null
      - name: tx_hash
        tests:
          - not_null
      - name: action
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - address
            - chain
            - tx_hash
            - action

  - name: fct_tweet_alerts
    description: Thin mart of tweet alert events for ops monitoring.
    columns:
      - name: tweet_id
        tests:
          - not_null
      - name: alert_type
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - tweet_id
            - alert_type

  - name: dim_assets_history
    description: >
      SCD2 history of the active research universe from snap_assets.
      Includes dbt snapshot validity columns.
    columns:
      - name: symbol
        tests:
          - not_null
      - name: dbt_scd_id
        tests:
          - not_null
          - unique
