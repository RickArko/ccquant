version: 2

models:
  - name: stg_assets
    columns:
      - name: symbol
        tests:
          - not_null
      - name: as_of_date
        tests:
          - not_null
      - name: active
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - symbol
            - as_of_date

  - name: stg_ohlcv_daily
    columns:
      - name: symbol
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: source
        tests:
          - not_null
          - accepted_values:
              values: ['binance', 'coinbase', 'coingecko']
      - name: volume
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: open
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: high
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: low
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: close
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - symbol
            - date
            - source

  - name: stg_ohlcv_hourly
    columns:
      - name: symbol
        tests:
          - not_null
      - name: hour
        tests:
          - not_null
      - name: source
        tests:
          - not_null
          - accepted_values:
              values: ['binance', 'coinbase']
      - name: volume
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: open
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: high
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: low
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: close
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - symbol
            - hour
            - source

  - name: stg_sync_state
    columns:
      - name: symbol
        tests:
          - not_null
      - name: interval
        tests:
          - not_null
          - accepted_values:
              values: ['1d', '1h']
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - symbol
            - interval

  - name: stg_onchain_series
    columns:
      - name: metric
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: value
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: -1000000000
              max_value: 1000000000000000
      - name: source
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - metric
            - date
            - source

  - name: stg_open_interest
    columns:
      - name: symbol
        tests:
          - not_null
      - name: timestamp
        tests:
          - not_null
      - name: open_interest
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
      - name: exchange
        tests:
          - not_null
          - accepted_values:
              values: ['binance', 'bybit', 'okx']
      - name: unit
        tests:
          - not_null
          - accepted_values:
              values: ['usd_notional', 'coin', 'contracts']
      - name: interval
        tests:
          - not_null
          - accepted_values:
              values: ['1d', '1h']
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - symbol
            - timestamp
            - exchange
            - interval

  - name: stg_order_book_snapshots
    columns:
      - name: symbol
        tests:
          - not_null
      - name: timestamp
        tests:
          - not_null
      - name: exchange
        tests:
          - not_null
          - accepted_values:
              values: ['binance', 'bybit', 'okx']
      - name: mid
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
      - name: spread_bps
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - symbol
            - timestamp
            - exchange

  - name: stg_dex_price_daily
    columns:
      - name: symbol
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: venue
        tests:
          - not_null
      - name: price_usd
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - symbol
            - date
            - venue

  - name: stg_mev_boost_payloads
    columns:
      - name: slot
        tests:
          - not_null
      - name: value_eth
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
      - name: relay
        tests:
          - not_null
      - name: date
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - slot
            - relay

  - name: stg_macro_series
    columns:
      - name: series_id
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: value
        tests:
          - not_null
      - name: source
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - series_id
            - date
            - source

  - name: stg_tweets
    columns:
      - name: tweet_id
        tests:
          - not_null
          - unique
      - name: handle
        tests:
          - not_null
      - name: posted_at
        tests:
          - not_null

  - name: stg_tweet_entities
    columns:
      - name: tweet_id
        tests:
          - not_null
      - name: entity_type
        tests:
          - not_null
      - name: entity_value
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - tweet_id
            - entity_type
            - entity_value

  - name: stg_twitter_accounts
    columns:
      - name: handle
        tests:
          - not_null
          - unique

  - name: stg_tweet_signals_daily
    columns:
      - name: date
        tests:
          - not_null
      - name: symbol
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - date
            - symbol

  - name: stg_tweet_alerts
    columns:
      - name: tweet_id
        tests:
          - not_null
      - name: alert_type
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - tweet_id
            - alert_type

  - name: stg_tweet_sync_state
    columns:
      - name: handle
        tests:
          - not_null
          - unique

  - name: stg_wallet_registry
    columns:
      - name: address
        tests:
          - not_null
      - name: chain
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - address
            - chain

  - name: stg_wallet_transfers
    columns:
      - name: chain
        tests:
          - not_null
      - name: tx_hash
        tests:
          - not_null
      - name: block_time
        tests:
          - not_null

  - name: stg_wallet_positions_daily
    columns:
      - name: address
        tests:
          - not_null
      - name: chain
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: asset_mint
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - address
            - chain
            - date
            - asset_mint

  - name: stg_wallet_alerts
    columns:
      - name: address
        tests:
          - not_null
      - name: chain
        tests:
          - not_null
      - name: tx_hash
        tests:
          - not_null
      - name: action
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - address
            - chain
            - tx_hash
            - action

  - name: stg_wallet_sync_state
    columns:
      - name: address
        tests:
          - not_null
      - name: chain
        tests:
          - not_null
      - name: source
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - address
            - chain
            - source

  - name: stg_wallet_identities
    columns:
      - name: identity_id
        tests:
          - not_null
          - unique
      - name: display_name
        tests:
          - not_null

  - name: stg_wallet_identity_links
    columns:
      - name: address
        tests:
          - not_null
      - name: chain
        tests:
          - not_null
      - name: identity_id
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - address
            - chain
            - identity_id

  - name: stg_onchain_sync_state
    columns:
      - name: metric
        tests:
          - not_null
      - name: source
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - metric
            - source

  - name: stg_macro_sync_state
    columns:
      - name: series_id
        tests:
          - not_null
      - name: source
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - series_id
            - source
