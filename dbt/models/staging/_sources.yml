version: 2

sources:
  - name: raw
    description: >
      Raw tables ingested by the Python layer (src/ccquant). dbt never writes
      to these — they are read-only sources for staging models.
    schema: main
    tables:
      - name: assets
        description: >
          Active research universe with CoinGecko IDs and exchange pairs.
          Grain: symbol x as_of_date.
        columns:
          - name: symbol
            description: Uppercase ticker symbol (primary key component).
          - name: as_of_date
            description: Date the universe snapshot was taken.
          - name: rank
            description: Market-cap rank at snapshot time.
          - name: active
            description: Whether the asset is in the active universe.

      - name: ohlcv_daily
        description: >
          Daily OHLCV candles by symbol, date, and source.
          Grain: symbol x date x source.
        columns:
          - name: symbol
          - name: date
          - name: open
          - name: high
          - name: low
          - name: close
          - name: volume
          - name: source
            description: Data source — binance, coinbase, or coingecko.

      - name: ohlcv_hourly
        description: >
          Hourly OHLCV candles by symbol, hour, and source.
          Grain: symbol x hour x source.
        columns:
          - name: symbol
          - name: hour
          - name: open
          - name: high
          - name: low
          - name: close
          - name: volume
          - name: source

      - name: sync_state
        description: >
          Per-symbol sync metadata tracking backfill progress.
          Grain: symbol x interval.
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 72, period: hour}
        loaded_at_field: last_refresh_at
        columns:
          - name: symbol
          - name: interval
          - name: backfill_complete
          - name: earliest_at
          - name: latest_at
          - name: last_refresh_at

      - name: onchain_series
        description: >
          On-chain metric time series (MVRV, NUPL, hashrate, etc.) migrated
          from onchain.duckdb. Grain: metric x date x source.
        columns:
          - name: metric
          - name: date
          - name: value
          - name: source

      - name: onchain_sync_state
        description: >
          Per-metric sync metadata for on-chain series. Grain: metric x source.
        columns:
          - name: metric
          - name: source
          - name: latest_at
          - name: last_refresh_at

      - name: open_interest
        description: >
          Open interest by symbol, timestamp, exchange, and interval.
          Grain: symbol x timestamp x exchange x interval.
        columns:
          - name: symbol
          - name: timestamp
          - name: open_interest
          - name: exchange
          - name: unit
          - name: interval

      - name: macro_series
        description: >
          Macro indicator time series (FRED). Grain: series_id x date x source.
        columns:
          - name: series_id
          - name: date
          - name: value
          - name: source

      - name: macro_sync_state
        description: >
          Per-series sync metadata for macro data. Grain: series_id x source.
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 72, period: hour}
        loaded_at_field: last_refresh_at
        columns:
          - name: series_id
          - name: source
          - name: latest_at
          - name: last_refresh_at

      - name: twitter_accounts
        description: >
          Curated crypto twitter watchlist. Grain: handle.
        columns:
          - name: handle
          - name: entity_type
          - name: active

      - name: tweets
        description: >
          Normalized tweets from CSV/JSONL imports. Grain: tweet_id.
        columns:
          - name: tweet_id
          - name: handle
          - name: posted_at
          - name: text

      - name: tweet_entities
        description: >
          Extracted cashtags, addresses, urls. Grain: tweet_id x entity.
        columns:
          - name: tweet_id
          - name: entity_type
          - name: entity_value

      - name: tweet_signals_daily
        description: >
          Pre-aggregated tweet mention signals per symbol/day.
        columns:
          - name: date
          - name: symbol
          - name: mention_count

      - name: tweet_alerts
        description: >
          Batch-detected high-signal tweet events.
        columns:
          - name: tweet_id
          - name: alert_type
          - name: posted_at

      - name: wallet_registry
        description: >
          Curated and discovered wallet addresses with labels and provenance.
          Grain: address x chain.
        columns:
          - name: address
          - name: chain
          - name: label
          - name: entity_type
          - name: confidence
          - name: source
          - name: active

      - name: wallet_transfers
        description: >
          Normalized wallet transfer events across Solana and Arbitrum.
          Grain: chain x tx_hash x transfer_index x from x to x mint.
        columns:
          - name: chain
          - name: tx_hash
          - name: block_time
          - name: from_address
          - name: to_address
          - name: asset_mint_or_contract
          - name: direction
          - name: source

      - name: wallet_positions_daily
        description: >
          End-of-day wallet position snapshots. Grain: address x chain x date x mint.
        columns:
          - name: address
          - name: chain
          - name: date
          - name: asset_mint
          - name: balance

      - name: wallet_sync_state
        description: >
          Per-wallet sync cursors for history and tail refresh.
          Grain: address x chain x source.
        columns:
          - name: address
          - name: chain
          - name: source
          - name: backfill_complete
          - name: latest_at

      - name: wallet_signals_daily
        description: >
          Pre-aggregated wallet flow signals by date and chain.
          Grain: date x chain.
        columns:
          - name: date
          - name: chain
          - name: smart_money_netflow_usd
          - name: kol_buy_count
          - name: cabal_alert_count

      - name: wallet_alerts
        description: >
          Generated wallet alert events for monitoring.
          Grain: address x chain x tx_hash x action.
        columns:
          - name: address
          - name: chain
          - name: action
          - name: severity
          - name: block_time
