version: 2

models:
  - name: fct_onchain_signals
    description: >
      On-chain metrics pivoted wide by date. One row per date with columns
      for each metric (hashrate, difficulty, MVRV, NUPL, etc.).
    columns:
      - name: date
        tests:
          - not_null
          - unique
      - name: mvrv
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
              row_condition: "mvrv is not null"
              strictly: false
      - name: nupl
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -1
              max_value: 1
              row_condition: "nupl is not null"
              strictly: false

  - name: fct_macro_series
    description: >
      FRED macro indicators pivoted wide by date. One row per date with
      columns for each series (M2SL, WALCL, DGS10, etc.).
    columns:
      - name: date
        tests:
          - not_null
          - unique

  - name: fct_wallet_flows_daily
    description: Daily wallet transfer flows by chain and entity type.
    columns:
      - name: date
        tests:
          - not_null
      - name: chain
        tests:
          - not_null
      - name: entity_type
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - date
            - chain
            - entity_type

  - name: fct_wallet_signals_daily
    description: Aggregated wallet intelligence signals by date and chain.
    columns:
      - name: date
        tests:
          - not_null
      - name: chain
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - date
            - chain

  - name: fct_wallet_cabal_events
    description: Detected coordinated wallet inflow windows.
    columns:
      - name: date
        tests:
          - not_null
      - name: chain
        tests:
          - not_null
      - name: mint
        tests:
          - not_null
      - name: window_start
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - date
            - chain
            - mint
            - window_start

  - name: fct_wallet_smart_money
    description: Smart-money scoring per watched wallet address.
    columns:
      - name: date
        tests:
          - not_null
      - name: chain
        tests:
          - not_null
      - name: address
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - date
            - chain
            - address
