name: dbt build & test

on:
  pull_request:
    paths:
      - "dbt/**"
      - "config/**"
      - "tests/fixtures/**"
      - ".github/workflows/dbt.yml"
  workflow_dispatch:

jobs:
  dbt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --extra dbt

      - name: Initialize database schema and seed CI fixture
        run: |
          rm -f data/ccquant.duckdb
          uv run python -c "
          from ccquant.config import load_config
          from ccquant.storage import MarketStore
          from tests.fixtures.seed_dbt_fixture import seed_dbt_ci_fixture
          cfg = load_config()
          store = MarketStore(cfg.database)
          store.close()
          seed_dbt_ci_fixture(cfg.database)
          print('Database initialized with fixture:', cfg.database)
          "

      - name: Install dbt packages
        run: uv run dbt deps --project-dir dbt --profiles-dir dbt

      - name: Build dbt models
        run: uv run dbt build --full-refresh --project-dir dbt --profiles-dir dbt
        env:
          CCQUANT_DB: data/ccquant.duckdb

      - name: Run project evaluator
        run: uv run dbt build --select package:dbt_project_evaluator --project-dir dbt --profiles-dir dbt
        env:
          CCQUANT_DB: data/ccquant.duckdb

      - name: Generate dbt docs
        run: uv run dbt docs generate --project-dir dbt --profiles-dir dbt
        env:
          CCQUANT_DB: data/ccquant.duckdb

      - name: Upload dbt docs
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: dbt/target/
