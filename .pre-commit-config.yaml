repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff check (lint + fix)
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi, jupyter]
        require_serial: true
      - id: mypy
        name: mypy src (strict)
        entry: uv run mypy src
        language: system
        pass_filenames: false
        files: ^(src|tests)/
        types: [python]
        require_serial: true
      - id: pytest
        name: pytest
        entry: uv run pytest -q
        language: system
        pass_filenames: false
        files: ^(src|tests)/
        types: [python]
        require_serial: true
